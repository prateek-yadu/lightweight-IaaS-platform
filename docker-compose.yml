services:
  proxy:
    image: nginx:stable-alpine
    container_name: nginx
    volumes:
      - ./__infra__/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./__infra__/nginx/lxd.conf:/etc/nginx/templates/default.conf.template
      - ./__infra__/nginx/certificates/nginx.crt:/etc/nginx/crts/nginx.crt
      - ./__infra__/nginx/certificates/nginx.key:/etc/nginx/crts/nginx.key
    environment:
      - LXD_SERVER_URL=https://192.168.29.102:8443
    ports:
      - 8080:80
    healthcheck:
      test: [ "CMD", "curl", "-X GET", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: mysql:oraclelinux9
    container_name: mysql-1
    volumes:
      - ./__infra__/mysql/my.cnf:/etc/my.cnf
      - ./__infra__/mysql/data:/var/lib/mysql
      - ./__infra__/mysql:/docker-entrypoint-initdb.d
    environment:
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - 3306:3306
      - 33060:33060
    healthcheck:
      test: [ "CMD", "mysqladmin", "-p $$MYSQL_ROOT_PASSWORD", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cache:
    image: redis:alpine3.23
    container_name: redis
    volumes:
      - ./__infra__/redis/data:/data
    environment:
      - REDIS_ARGS=--appendonly yes
    ports:
      - 6379:6379
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 5173:5173
    env_file:
      - ./frontend/.env
    depends_on:
      api-server:
        condition: service_healthy

  api-server:
    build:
      context: backend
      dockerfile: ./docker/api/Dockerfile
    volumes:
      - ./logs/backend:/logs/backend
    ports:
      - 3000:3000
    env_file:
      - ./backend/.env
    healthcheck:
      test: [ "CMD", "curl", "-X GET", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  lxd-agent:
    build:
      context: lxd_agent
      dockerfile: Dockerfile
    volumes:
      - ./logs/lxd_agent:/logs/lxd_agent
    ports:
      - 8000:8000
    env_file:
      - ./lxd_agent/.env
    healthcheck:
      test: [ "CMD", "curl", "-X GET", "http://localhost:8000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      proxy:
        condition: service_healthy

  
  # Workers 
  event-worker:
    build:
      context: backend
      dockerfile: ./docker/workers/event-worker/Dockerfile
    volumes:
      - ./logs/workers/event:/logs/workers/event
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      proxy:
        condition: service_healthy

  sync-worker:
    build:
      context: backend
      dockerfile: ./docker/workers/sync-worker/Dockerfile
    volumes:
      - ./logs/workers/sync:/logs/workers/sync
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      proxy:
        condition: service_healthy

  provision-worker:
    build:
      context: backend
      dockerfile: ./docker/workers/provision-worker/Dockerfile
    volumes:
      - ./logs/workers/provision:/logs/workers/provision
    env_file:
      - ./backend/.env
    depends_on:
      cache:
        condition: service_healthy
      proxy:
        condition: service_healthy

  lifecycle-worker:
    build:
      context: backend
      dockerfile: ./docker/workers/lifecycle-worker/Dockerfile
    volumes:
      - ./logs/workers/lifecycle:/logs/workers/lifecycle
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      proxy:
        condition: service_healthy

  expiry-worker:
    build:
      context: backend
      dockerfile: ./docker/workers/expiry-worker/Dockerfile
    volumes:
      - ./logs/workers/expiry:/logs/workers/expiry
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      proxy:
        condition: service_healthy

  # Monitoring
  scraper:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.16.0}
    container_name: alloy
    ports:
      - 12345:12345
      - 4318:4318
    volumes:
      - ./__infra__/loki/config.alloy:/etc/alloy/config.alloy
      - ./logs:/temp/logs
    command: run --server.http.listen-addr=0.0.0.0:12345 --stability.level=experimental  --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - logs_collector

  logs_collector:
    image: grafana/loki:${GRAFANA_LOKI_VERSION:-3.6.10}
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./__infra__/loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-13.0.1}
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - 8001:3000/tcp
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy
          orgId: 1
          url: http://loki:3100
          basicAuth: false
          isDefault: false
          version: 1
          editable: false
        EOF
        /run.sh
